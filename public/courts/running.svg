<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" width="940" height="500">

  <!-- Rubber track base -->
  <rect width="940" height="500" fill="#B84B20"/>

  <!-- Track texture grain lines -->
  <line x1="0" y1="32"  x2="940" y2="32"  stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="64"  x2="940" y2="64"  stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="96"  x2="940" y2="96"  stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="128" x2="940" y2="128" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="160" x2="940" y2="160" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="192" x2="940" y2="192" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="224" x2="940" y2="224" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="256" x2="940" y2="256" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="288" x2="940" y2="288" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="320" x2="940" y2="320" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="352" x2="940" y2="352" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="384" x2="940" y2="384" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="416" x2="940" y2="416" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="448" x2="940" y2="448" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="480" x2="940" y2="480" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>

  <!-- Inner grass field -->
  <ellipse cx="470" cy="250" rx="278" ry="138" fill="#2E7D32"/>
  <!-- Field inner markings -->
  <rect x="237" y="195" width="466" height="110" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="470" y1="195" x2="470" y2="305" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Field border -->
  <ellipse cx="470" cy="250" rx="278" ry="138" fill="none" stroke="white" stroke-width="2.5"/>

  <!-- ── 8 LANE TRACK ── -->
  <!-- Outer boundary -->
  <ellipse cx="470" cy="250" rx="420" ry="210" fill="none" stroke="white" stroke-width="3"/>
  <!-- Lane 1 -->
  <ellipse cx="470" cy="250" rx="400" ry="200" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <!-- Lane 2 -->
  <ellipse cx="470" cy="250" rx="380" ry="190" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <!-- Lane 3 -->
  <ellipse cx="470" cy="250" rx="360" ry="180" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <!-- Lane 4 -->
  <ellipse cx="470" cy="250" rx="340" ry="170" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <!-- Lane 5 -->
  <ellipse cx="470" cy="250" rx="320" ry="160" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <!-- Lane 6 -->
  <ellipse cx="470" cy="250" rx="300" ry="150" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <!-- Lane 7 (inner edge of lane 8) -->
  <ellipse cx="470" cy="250" rx="280" ry="140" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>

  <!-- Start / Finish line (yellow) -->
  <line x1="470" y1="40"  x2="470" y2="460" stroke="#FAF189" stroke-width="3"/>

  <!-- Staggered start marks (yellow) per lane -->
  <line x1="488" y1="50"  x2="488" y2="62"  stroke="#FAF189" stroke-width="2" opacity="0.7"/>
  <line x1="506" y1="60"  x2="506" y2="72"  stroke="#FAF189" stroke-width="2" opacity="0.7"/>
  <line x1="524" y1="70"  x2="524" y2="82"  stroke="#FAF189" stroke-width="2" opacity="0.7"/>
  <line x1="542" y1="80"  x2="542" y2="92"  stroke="#FAF189" stroke-width="2" opacity="0.7"/>
  <line x1="560" y1="90"  x2="560" y2="102" stroke="#FAF189" stroke-width="2" opacity="0.7"/>
  <line x1="578" y1="100" x2="578" y2="112" stroke="#FAF189" stroke-width="2" opacity="0.7"/>
  <line x1="596" y1="110" x2="596" y2="122" stroke="#FAF189" stroke-width="2" opacity="0.7"/>

  <!-- Centre / home straight sector lines -->
  <line x1="192" y1="250" x2="310" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="8 5"/>
  <line x1="192" y1="250" x2="310" y2="360" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="8 5"/>
  <line x1="748" y1="250" x2="630" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="8 5"/>
  <line x1="748" y1="250" x2="630" y2="360" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="8 5"/>

  <!-- Centre spot -->
  <circle cx="470" cy="250" r="5" fill="#FAF189"/>

</svg>
