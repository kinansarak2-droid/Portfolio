  <line x1="357" y1="80"  x2="357" y2="420" stroke="#FAF189" stroke-width="1.5" stroke-dasharray="10 6" opacity="0.6"/>
  <line x1="583" y1="80"  x2="583" y2="420" stroke="#FAF189" stroke-width="1.5" stroke-dasharray="10 6" opacity="0.6"/>

